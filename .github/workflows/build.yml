name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0）时触发打包

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # 建议用 3.11 提高打包稳定性

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --collect-all 确保所有依赖被包含
        # --noconsole 隐藏黑窗口
        pyinstaller --noconfirm --onedir --windowed --collect-all faster_whisper main.py

    - name: Zip Release
      run: |
        Compress-Archive -Path dist/main/* -DestinationPath KotobaWhisper_Tool.zip

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: KotobaWhisper_Tool.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
